<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Letters</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top,
        rgba(255,247,237,0.14) 0%,
        rgba(15,23,42,0.96) 40%,
        rgba(2,6,23,1) 100%);
      font-family: Georgia, serif;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.92);
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.35);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2.2rem;
      color: #111827;
    }

    input {
      width: 100%;
      margin-top: 32px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid #d1d5db;
      background: #fbf7ef;
      font-size: 1rem;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      border: none;
      border-radius: 18px;
      background: #111827;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1f2937;
    }

    iframe {
      width: 100%;
      height: 75vh;
      border: none;
      border-radius: 24px;
      margin-top: 24px;
      background: white;
    }

    .hidden {
      display: none;
    }

    .top {
      margin-bottom: 16px;
      text-align: center;
      color: white;
    }

    .back-button {
      max-width: 140px;
      margin: 0 auto 20px auto;
      display: block;
    }
  </style>
</head>
<body>

  <div id="loginCard" class="card">
    <h1>Enter Full Name</h1>

    <input
      type="text"
      id="nameInput"
      placeholder="Enter Full Name"
    />

    <button onclick="unlockDocument()">
      Enter
    </button>
  </div>

  <div id="documentView" class="hidden">
    <div class="top">
      <h1 id="personName"></h1>
    </div>

    <button class="back-button" onclick="goBack()">
      Back
    </button>

    <iframe id="docFrame"></iframe>
  </div>

  <script>
    const DOCUMENTS = {
      "delmar yesaya junior cime tanihaha":
        "https://docs.google.com/document/d/1FfvpHftdjnWNjWC9tQ1Z_1TW5Te-LaNrysVYCZHfzrM/preview",

      "theodore diago wijaya":
        "https://docs.google.com/document/d/1vZfHoze0XC9iqur6deInjDAmoEwab4cIZ-zMZfkbHtw/preview",

      "nadya shakira febriani":
        "https://docs.google.com/document/d/1IZ-eHQ4XieMJmVhf0D8TmOsGy69lM6eh1Zk91g3QO4g/preview",

      "miranda alvina trilaras":
        "https://docs.google.com/document/d/1nEzWmaOjYo35FxhtRFa0SQcp65IBcUNXd3yh6xtdsAE/preview",

      "gerald austin limena":
        "https://docs.google.com/document/d/1mmbbCkXOjdudrY0h7xXUs7ceoul_AgKCNJKfKvipSRY/preview",

      "darren cristian jomi":
        "https://docs.google.com/document/d/1Ubqg7xOxkLOH6UqcxrIcUxfjx_JbXS_COg2IsyuTSU4/preview",

      "joanna lee":
        "https://docs.google.com/document/d/1UOzifL42SrQiTpG-X3scATqlNQwE95mZOFV1KP_7dWQ/preview",

      "jason nathaniel soesanto":
        "https://docs.google.com/document/d/1wzK18rlvWmu7fNDKKlpQ9QD-PgZ9yB47ukraOZFVUqo/preview",

      "geoffrey aaron bennet":
        "https://docs.google.com/document/d/13klYq4oxIuWfcMKwl4HdqG5GPumZwJDCwyWbJl4T2bg/preview",

      "andersen sidik djojowahono":
        "https://docs.google.com/document/d/1JmFhADkibryoKPo7TMUd1iBo4vj0ggoS2Wrm0kjNLnU/preview",

      "poh priscilla eugene dharma saputra":
        "https://docs.google.com/document/d/1OPiE2lpCJyPtreoeFsnzpMFYzIKahNhTzJcTIA1jvHQ/preview"
    };

    function normalize(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
    }

    function unlockDocument() {
      const input = document.getElementById("nameInput").value;
      const normalized = normalize(input);

      const documentUrl = DOCUMENTS[normalized];

      if (!documentUrl) {
        return;
      }

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("documentView").classList.remove("hidden");

      document.getElementById("personName").innerText = input;
      document.getElementById("docFrame").src = documentUrl;
    }

    function goBack() {
      document.getElementById("documentView").classList.add("hidden");
      document.getElementById("loginCard").classList.remove("hidden");

      document.getElementById("nameInput").value = "";
      document.getElementById("docFrame").src = "";
    }
  </script>

</body>
</html>
